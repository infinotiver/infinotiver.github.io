name: Deploy to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          # point to cache in v3/
          cache-dependency-path: v3/pnpm-lock.yaml

      - name: Build
        run: |
          cd v3
          pnpm install --no-frozen-lockfile
          pnpm run build
          echo "--- DEBUG: Listing contents of v3/dist ---"
          ls -R dist # This will show us if index.html and assets exist

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./v3/dist
          force_orphan: true # This wipes the gh-pages branch clean before pushing